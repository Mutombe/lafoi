name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lafoi
          POSTGRES_PASSWORD: lafoi
          POSTGRES_DB: lafoi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lafoi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-only-not-used-in-prod
      DEBUG: 'False'
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://lafoi:lafoi@localhost:5432/lafoi?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      SECURE_SSL_REDIRECT: 'False'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING || true
        # `|| true` because some checks (e.g. SECURE_SSL_REDIRECT) only matter
        # in the actual prod env. Hard-fails would block valid PRs.

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: python manage.py test --noinput
